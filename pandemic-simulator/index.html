<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pandemic Simulator</title>
<style>body{margin:0;background:#101521;color:#f7f9ff;font-family:Arial,sans-serif}header{text-align:center;padding:18px}.wrap{max-width:1220px;margin:auto;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:16px}.panel{background:#1c2435;border:1px solid #3b4660;border-radius:18px;padding:16px}canvas{width:100%;background:#0b1020;border-radius:18px}button,input{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #46536f;background:#111827;color:white}button{background:#65e2ff;color:#061018;font-weight:900}@media(max-width:850px){.wrap{grid-template-columns:1fr}}</style></head>
<body><header><h1>🦠 Pandemic Simulator</h1><p>Adjust spread, travel, and vaccination to see how outbreaks change.</p></header><div class="wrap"><aside class="panel"><label>Spread rate <input id="spread" type="range" min="0.01" max="0.16" step="0.01" value="0.06"></label><label>Vaccination <input id="vacc" type="range" min="0" max="0.8" step="0.05" value="0.2"></label><label>Travel <input id="travel" type="range" min="0" max="1" step="0.05" value="0.4"></label><button id="start">Start / Restart</button><button id="pause">Pause</button><p id="stats"></p></aside><main><canvas id="c" width="880" height="620"></canvas></main></div>
<script>
const ctx=c.getContext("2d");let cities=[],day=0,running=false;
const names=["Vancouver","New York","Mexico City","Sao Paulo","London","Paris","Cairo","Lagos","Moscow","Delhi","Beijing","Tokyo","Sydney","Cape Town","Dubai","Singapore"];
const spots=[[125,175],[250,190],[210,285],[330,430],[420,170],[445,205],[490,300],[455,365],[555,160],[630,305],[710,255],[780,265],[775,495],[500,500],[560,285],[700,390]];
function reset(){cities=spots.map((p,i)=>({name:names[i],x:p[0],y:p[1],pop:800+Math.random()*2200,inf:0,rec:0,vac:+vacc.value}));cities[1].inf=15;day=0;running=true}
function step(){if(!running)return;day++;let s=+spread.value,t=+travel.value;cities.forEach(a=>{let sus=Math.max(0,a.pop-a.inf-a.rec-a.pop*a.vac);let newInf=Math.min(sus,a.inf*s*(1-a.vac));a.inf+=newInf;a.rec+=a.inf*.018;a.inf*=.982});for(let i=0;i<cities.length;i++)for(let j=i+1;j<cities.length;j++){let a=cities[i],b=cities[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(Math.random()<t*.018*(1-d/900)){let move=a.inf*.006*t;b.inf+=move;a.inf-=move;move=b.inf*.006*t;a.inf+=move;b.inf-=move}}draw()}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#09111f";ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#1d3557";ctx.lineWidth=2;spots.forEach((p,i)=>spots.forEach((q,j)=>{if(i<j&&Math.hypot(p[0]-q[0],p[1]-q[1])<230){ctx.globalAlpha=.22;ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(q[0],q[1]);ctx.stroke();ctx.globalAlpha=1}}));let totalInf=0,totalPop=0,totalRec=0;cities.forEach(city=>{totalInf+=city.inf;totalPop+=city.pop;totalRec+=city.rec;let ratio=city.inf/city.pop;ctx.fillStyle=`rgba(255,80,95,${.25+Math.min(.75,ratio*9)})`;ctx.beginPath();ctx.arc(city.x,city.y,14+ratio*110,0,7);ctx.fill();ctx.fillStyle="#67e8f9";ctx.beginPath();ctx.arc(city.x,city.y,5,0,7);ctx.fill();ctx.fillStyle="white";ctx.font="12px Arial";ctx.fillText(city.name,city.x+9,city.y-9)});stats.innerHTML=`Day ${day}<br>Infected: ${Math.round(totalInf).toLocaleString()} / ${Math.round(totalPop).toLocaleString()}<br>Recovered: ${Math.round(totalRec).toLocaleString()}`}
setInterval(step,180);start.onclick=reset;pause.onclick=()=>running=!running;reset();draw();
</script></body></html>
