<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pandemic Simulator</title>
  <style>
    html,body{margin:0;background:#0b111c;color:#f4f6fb;font-family:Inter,Segoe UI,Arial,sans-serif;overflow:hidden}
    canvas{display:block;margin:0 auto;background:#0b111c;max-width:100vw;max-height:100vh}
  </style>
</head>
<body>
<canvas id="game" width="1280" height="720"></canvas>
<script>
const canvas=document.getElementById("game"),g=canvas.getContext("2d"),W=1280,H=720;
const BG="#0b111c",PANEL="#121b2b",PANEL2="#172235",LINE="#2b3c58",WHITE="#f4f6fb",MUTED="#a9b4c7",ACCENT="#7dd3fc",RED="#ef5668",GREEN="#75e6a7",YELLOW="#f4c95d";
let mode="CONFIG",buttons=[],selected=[null,null,null],flights=true,boats=true,startName="United States",paused=false,speed=1,sim=null,particles=[],mouse={x:0,y:0};
const map={x:34,y:104,w:820,h:548};
const cats=[
  {name:"Transmission",parts:[["Airborne Mist","+ spreads quickly","less deadly",{spread:.45,travel:.20,death:-.01}],["Surface Touch","+ steady local spread","slower travel",{spread:.22,travel:-.05}],["Waterborne","+ strong coastal spread","weak inland",{spread:.30,boat:.35}]]},
  {name:"Symptoms",parts:[["Silent Fever","+ hard to detect","low danger",{stealth:.35,death:-.01}],["Burning Cough","+ very infectious","detected faster",{spread:.25,stealth:-.05}],["Organ Shock","+ high danger","slower spread",{death:.04,spread:-.08}]]},
  {name:"Resistance",parts:[["Heat Shell","+ survives hot climates","costly",{spread:.08}],["Drug Resistant","+ harder to cure","public reacts",{recovery:-.02,stealth:-.05}],["Fast Mutation","+ adapts quickly","unstable",{spread:.20,death:.01,recovery:.01}]]}
];
const countries=[
 ["Canada",190,156,38000,true],["United States",238,218,331000,true],["Mexico",230,302,128000,true],["Brazil",350,434,214000,true],["Argentina",326,552,45000,true],
 ["United Kingdom",456,176,67000,true],["France",496,222,65000,true],["Spain",472,258,47000,true],["Germany",520,202,83000,false],["Turkey",580,254,85000,true],
 ["Russia",665,158,144000,true],["Egypt",558,322,104000,true],["Nigeria",506,390,213000,true],["South Africa",548,560,60000,true],["Saudi Arabia",622,326,36000,true],
 ["India",704,330,1400000,true],["China",790,266,1410000,true],["Japan",895,270,125000,true],["Indonesia",782,438,276000,true],["Australia",835,540,26000,true]
].map((c,i)=>({id:i,name:c[0],x:c[1],y:c[2],pop:c[3],coastal:c[4]}));
function base(){return{spread:.22,death:.018,recovery:.055,travel:.24,boat:.18,stealth:.10}}
function params(){let p=base();selected.forEach((s,i)=>{if(s==null)return;let m=cats[i].parts[s][3];Object.keys(m).forEach(k=>p[k]=(p[k]||0)+m[k])});p.spread=Math.max(.02,p.spread);p.recovery=Math.max(.01,p.recovery);return p}
function round(x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath()}
function button(x,y,w,h,label,fill=PANEL2,fg=WHITE){g.fillStyle=fill;round(x,y,w,h,12);g.fill();g.strokeStyle=LINE;g.lineWidth=1;g.stroke();g.fillStyle=fg;g.font="15px Inter, Arial";g.textAlign="center";g.fillText(label,x+w/2,y+h/2+5);buttons.push({x,y,w,h,label})}
function inside(b,x,y){return x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h}
canvas.onmousemove=e=>{let r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*W/r.width;mouse.y=(e.clientY-r.top)*H/r.height};
canvas.onclick=()=>click(mouse.x,mouse.y);
addEventListener("keydown",e=>{if(e.code==="Space")paused=!paused;if(e.key.toLowerCase()==="r")mode="CONFIG"});
function click(x,y){let b=buttons.find(q=>inside(q,x,y));if(!b)return;if(mode==="CONFIG"){if(b.cat!=null)selected[b.cat]=b.idx;if(b.label==="Flights")flights=!flights;if(b.label==="Boats")boats=!boats;if(b.country)startName=b.country;if(b.label==="Start simulation"&&selected.every(v=>v!=null))start()}else{if(b.label==="Pause"||b.label==="Resume")paused=!paused;if(b.label==="New virus")mode="CONFIG";if(b.label==="Faster")speed=Math.min(4,speed+.5);if(b.label==="Slower")speed=Math.max(.5,speed-.5)}}
function start(){let p=params();sim={p,day:0,S:[],I:[],R:[],D:[],over:false};countries.forEach((c,i)=>{let vaccinated=Math.floor(c.pop*.14);sim.S[i]=c.pop-vaccinated;sim.I[i]=0;sim.R[i]=vaccinated;sim.D[i]=0});let idx=countries.findIndex(c=>c.name===startName);let seed=Math.max(50,Math.floor(countries[idx].pop*.001));sim.S[idx]-=seed;sim.I[idx]+=seed;particles=[];mode="SIM";paused=false;speed=1}
function step(dt){if(!sim||paused||sim.over)return;let p=sim.p,days=dt*speed;sim.day+=days;for(let i=0;i<countries.length;i++){let active=sim.I[i],sus=sim.S[i],pop=countries[i].pop;let newInf=Math.min(sus,active*p.spread*(1+p.stealth*.5)*days*(1-active/pop*.15));let rec=Math.min(active,active*p.recovery*days);let dead=Math.min(active-rec,active*p.death*days*.22);sim.S[i]-=newInf;sim.I[i]+=newInf-rec-dead;sim.R[i]+=rec;sim.D[i]+=dead}
  if(flights||boats){for(let i=0;i<countries.length;i++){if(sim.I[i]<80)continue;for(let n=0;n<2;n++){let j=Math.random()*countries.length|0;if(j===i)continue;let a=countries[i],b=countries[j],dist=Math.hypot(a.x-b.x,a.y-b.y);let chance=(flights?(.006+p.travel*.012):0)+(boats&&a.coastal&&b.coastal?(.004+p.boat*.018):0);chance*=Math.max(.2,1-dist/1000)*days;if(Math.random()<chance){let move=Math.min(sim.I[i]*.015,sim.S[j]*.02);sim.I[i]-=move;sim.I[j]+=move;particles.push({x:a.x,y:a.y,tx:b.x,ty:b.y,t:0,boat:boats&&!flights})}}}}
  let totalI=sim.I.reduce((a,b)=>a+b,0),totalS=sim.S.reduce((a,b)=>a+b,0);if(sim.day>=365||totalI<1||totalS<1)sim.over=true}
function config(){g.fillStyle=BG;g.fillRect(0,0,W,H);g.fillStyle=WHITE;g.font="42px Inter, Arial";g.textAlign="center";g.fillText("Build your virus",W/2,72);g.fillStyle=MUTED;g.font="16px Inter, Arial";g.fillText("Pick one option in each category, choose a starting country, then run the simulation.",W/2,106);
  cats.forEach((cat,i)=>{let x=42+i*285,y=150;g.fillStyle=ACCENT;g.font="23px Inter, Arial";g.textAlign="left";g.fillText(cat.name,x,y);cat.parts.forEach((p,j)=>{let yy=y+28+j*96,sel=selected[i]===j;button(x,yy,255,78,p[0],sel?ACCENT:PANEL2,sel?"#071018":WHITE);buttons[buttons.length-1].cat=i;buttons[buttons.length-1].idx=j;g.fillStyle=sel?"#071018":MUTED;g.font="12px Inter, Arial";g.textAlign="center";g.fillText(p[1],x+127,yy+52);g.fillText(p[2],x+127,yy+67)})});
  g.fillStyle=PANEL;round(900,150,330,445,16);g.fill();g.strokeStyle=LINE;g.stroke();g.fillStyle=WHITE;g.font="23px Inter, Arial";g.textAlign="left";g.fillText("Starting country",930,190);
  countries.slice(0,10).forEach((c,i)=>{button(930,212+i*31,130,25,c.name,startName===c.name?ACCENT:PANEL2,startName===c.name?"#071018":WHITE);buttons[buttons.length-1].country=c.name});
  countries.slice(10,20).forEach((c,i)=>{button(1070,212+i*31,130,25,c.name,startName===c.name?ACCENT:PANEL2,startName===c.name?"#071018":WHITE);buttons[buttons.length-1].country=c.name});
  button(930,548,130,34,"Flights",flights?GREEN:PANEL2,flights?"#071018":WHITE);button(1070,548,130,34,"Boats",boats?GREEN:PANEL2,boats?"#071018":WHITE);button(920,622,290,48,"Start simulation",selected.every(v=>v!=null)?GREEN:"#43506a",selected.every(v=>v!=null)?"#071018":MUTED)}
function land(points,fill="#173a52"){g.beginPath();points.forEach((p,i)=>i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1]));g.closePath();g.fillStyle=fill;g.fill();g.strokeStyle="#6f8bad";g.lineWidth=1.2;g.stroke()}
function island(x,y,r){g.fillStyle="#173a52";g.strokeStyle="#6f8bad";g.lineWidth=1;g.beginPath();g.arc(x,y,r,0,7);g.fill();g.stroke()}
function worldMap(){
  let grd=g.createLinearGradient(map.x,map.y,map.x+map.w,map.y+map.h);grd.addColorStop(0,"#08203a");grd.addColorStop(1,"#09101e");g.fillStyle=grd;round(map.x,map.y,map.w,map.h,16);g.fill();g.strokeStyle="#405c7b";g.lineWidth=2;g.stroke();
  for(let x=80;x<830;x+=75){g.strokeStyle="rgba(160,190,220,.08)";g.lineWidth=1;g.beginPath();g.moveTo(x,120);g.lineTo(x,640);g.stroke()}for(let y=140;y<640;y+=58){g.beginPath();g.moveTo(50,y);g.lineTo(835,y);g.stroke()}
  land([[88,166],[118,134],[178,124],[230,150],[265,190],[252,232],[282,262],[248,294],[210,288],[180,322],[137,302],[96,280],[76,228]]);
  land([[205,306],[244,334],[282,386],[292,447],[322,507],[302,587],[262,632],[228,562],[214,502],[184,450],[190,384]],"#1a4058");
  land([[382,170],[430,140],[494,134],[548,152],[612,142],[690,168],[760,216],[742,258],[666,254],[614,294],[540,270],[486,288],[426,254],[390,216]]);
  land([[448,274],[512,292],[560,342],[552,408],[520,478],[470,460],[438,398],[420,324]],"#1b465d");
  land([[600,272],[674,240],[746,244],[820,286],[838,338],[806,388],[730,384],[662,344]]);
  land([[770,488],[835,482],[890,524],[866,580],[806,598],[750,554]],"#1d4b61");
  land([[564,510],[620,520],[660,572],[620,628],[552,604],[526,550]],"#173d59");
  island(432,188,10);island(462,198,8);island(858,254,8);island(708,432,8);island(720,448,6);
}
function drawMap(){g.fillStyle=BG;g.fillRect(0,0,W,H);worldMap();
  countries.forEach((a,i)=>countries.forEach((b,j)=>{if(i<j&&Math.hypot(a.x-b.x,a.y-b.y)<260){g.strokeStyle="rgba(125,211,252,.10)";g.lineWidth=1;g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke()}}));
  particles.forEach(p=>{p.t+=.018*speed;let x=p.x+(p.tx-p.x)*p.t,y=p.y+(p.ty-p.y)*p.t;g.strokeStyle=p.boat?"rgba(244,201,93,.35)":"rgba(125,211,252,.35)";g.lineWidth=2;g.beginPath();g.moveTo(p.x,p.y);g.lineTo(x,y);g.stroke();g.fillStyle=p.boat?YELLOW:ACCENT;g.beginPath();g.arc(x,y,4.5,0,7);g.fill()});particles=particles.filter(p=>p.t<1);
  let hovered=null;countries.forEach((c,i)=>{let ratio=sim.I[i]/c.pop,pulse=1+Math.sin(Date.now()/220+i)*.08,r=10+Math.min(62,ratio*1300)*pulse;if(ratio>.0001){let rad=g.createRadialGradient(c.x,c.y,2,c.x,c.y,r);rad.addColorStop(0,"rgba(255,95,110,.75)");rad.addColorStop(.45,`rgba(239,86,104,${.30+Math.min(.38,ratio*60)})`);rad.addColorStop(1,"rgba(239,86,104,0)");g.fillStyle=rad;g.beginPath();g.arc(c.x,c.y,r,0,7);g.fill()}g.fillStyle=ratio>.015?RED:ACCENT;g.beginPath();g.arc(c.x,c.y,5.5,0,7);g.fill();g.strokeStyle="#ffffffaa";g.lineWidth=1;g.stroke();g.fillStyle=WHITE;g.font="11px Inter, Arial";g.textAlign="left";g.fillText(c.name,c.x+9,c.y-9);if(Math.hypot(mouse.x-c.x,mouse.y-c.y)<Math.max(18,r*.55))hovered=i});
  g.fillStyle="rgba(244,246,251,.74)";g.font="12px Inter, Arial";g.textAlign="left";g.fillText("Infections move through nearby borders and travel routes.",54,638);
  if(hovered!=null){let c=countries[hovered];g.fillStyle="#05070de6";round(mouse.x+14,mouse.y+14,235,105,10);g.fill();g.strokeStyle="#395b82";g.stroke();g.fillStyle=WHITE;g.font="15px Inter, Arial";g.textAlign="left";g.fillText(c.name,mouse.x+28,mouse.y+39);g.fillStyle=MUTED;g.font="13px Inter, Arial";g.fillText(`Population: ${Math.round(c.pop).toLocaleString()}`,mouse.x+28,mouse.y+61);g.fillText(`Infected: ${Math.round(sim.I[hovered]).toLocaleString()}`,mouse.x+28,mouse.y+80);g.fillText(`Deaths: ${Math.round(sim.D[hovered]).toLocaleString()}`,mouse.x+28,mouse.y+99)}}
function stats(){let pop=countries.reduce((a,c)=>a+c.pop,0),I=sim.I.reduce((a,b)=>a+b,0),R=sim.R.reduce((a,b)=>a+b,0),D=sim.D.reduce((a,b)=>a+b,0);g.fillStyle=PANEL;round(882,104,366,548,16);g.fill();g.strokeStyle=LINE;g.stroke();g.fillStyle=WHITE;g.font="28px Inter, Arial";g.textAlign="left";g.fillText("World status",914,150);let lines=[`Day: ${Math.floor(sim.day)} / 365`,`Infected: ${Math.round(I).toLocaleString()}`,`Recovered/vaccinated: ${Math.round(R).toLocaleString()}`,`Deaths: ${Math.round(D).toLocaleString()}`,`Healthy: ${Math.round(pop-I-R-D).toLocaleString()}`,`Speed: ${speed.toFixed(1)}x`];g.font="17px Inter, Arial";lines.forEach((l,i)=>{g.fillStyle=i===1?RED:i===2?GREEN:i===3?YELLOW:WHITE;g.fillText(l,914,196+i*34)});let top=countries.map((c,i)=>[c.name,sim.I[i]]).sort((a,b)=>b[1]-a[1]).slice(0,8);g.fillStyle=ACCENT;g.font="20px Inter, Arial";g.fillText("Top outbreaks",914,430);g.font="15px Inter, Arial";top.forEach((t,i)=>{g.fillStyle=MUTED;g.fillText(`${t[0]}: ${Math.round(t[1]).toLocaleString()}`,914,462+i*23)});button(914,606,90,38,paused?"Resume":"Pause",ACCENT,"#071018");button(1014,606,90,38,"Slower");button(1114,606,90,38,"Faster");if(sim.over){g.fillStyle="#000c";g.fillRect(0,0,W,H);g.fillStyle=WHITE;g.font="46px Inter, Arial";g.textAlign="center";g.fillText("Simulation complete",W/2,H/2-42);button(W/2-120,H/2+76,240,50,"New virus",GREEN,"#071018")}}
function simDraw(){step(1/60);drawMap();stats();g.fillStyle=WHITE;g.font="17px Inter, Arial";g.textAlign="left";g.fillText("Space: pause   |   R: restart",38,58)}
function loop(){buttons=[];if(mode==="CONFIG")config();else simDraw();requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
