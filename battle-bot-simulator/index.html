<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Battle Bot Simulator</title>
<style>body{margin:0;background:#11141b;color:#f7f9ff;font-family:Arial,sans-serif}header{text-align:center;padding:18px}.wrap{max-width:1220px;margin:auto;display:grid;grid-template-columns:300px 1fr;gap:16px;padding:16px}.panel{background:#1d2432;border:1px solid #3b4660;border-radius:18px;padding:16px}select,button{width:100%;margin:6px 0;padding:10px;border-radius:10px;border:1px solid #46536f;background:#111827;color:white}button{background:#65e2ff;color:#07131b;font-weight:900;cursor:pointer}canvas{width:100%;background:#0b0e14;border-radius:18px;border:1px solid #3b4660}@media(max-width:850px){.wrap{grid-template-columns:1fr}}</style></head>
<body><header><h1>🤖 Battle Bot Simulator</h1><p>Build your bot, then fight the arena AI.</p></header><div class="wrap"><aside class="panel"><h2>Build</h2><label>Head</label><select id="head"><option>Sentry Dome</option><option>Iron Cube</option><option>Spike Unit</option></select><label>Body</label><select id="body"><option>Scout</option><option>Warrior</option><option>Goliath</option></select><label>Weapon</label><select id="weapon"><option>Plasma Blaster</option><option>Pulse Laser</option><option>Mega Hammer</option></select><label>Legs</label><select id="legs"><option>Heavy Wheels</option><option>Tank Treads</option><option>Mag-Lev</option></select><button id="start">Start Battle</button><p id="stats"></p><p>Controls: WASD to move. Your bot auto-attacks when aimed at the enemy.</p></aside><main><canvas id="c" width="880" height="620"></canvas></main></div>
<script>
const C=c.getContext("2d"),keys={};onkeydown=e=>keys[e.key.toLowerCase()]=1;onkeyup=e=>keys[e.key.toLowerCase()]=0;
const heads={"Sentry Dome":60,"Iron Cube":110,"Spike Unit":80},bodies={Scout:[120,4.8],Warrior:[180,3.7],Goliath:[300,2.4]},weapons={"Plasma Blaster":[28,34,430],"Pulse Laser":[6,3,310],"Mega Hammer":[85,65,95]},legs={"Heavy Wheels":[1.35,5],"Tank Treads":[.8,22],"Mag-Lev":[1.18,8]};
let p,e,shots=[],tick=0,msg="Build a bot and press Start Battle.";
function makeBot(x,y,isPlayer){let h=head.value,b=body.value,w=weapon.value,l=legs.value;if(!isPlayer){h=["Sentry Dome","Iron Cube","Spike Unit"][Math.random()*3|0];b=["Scout","Warrior","Goliath"][Math.random()*3|0];w=["Plasma Blaster","Pulse Laser","Mega Hammer"][Math.random()*3|0];l=["Heavy Wheels","Tank Treads","Mag-Lev"][Math.random()*3|0]}return{x,y,vx:0,vy:0,ang:0,h,b,w,l,hp:heads[h]+bodies[b][0]+legs[l][1],max:heads[h]+bodies[b][0]+legs[l][1],cool:0,player:isPlayer}}
function fire(a,b){let W=weapons[a.w],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);if(a.cool>0||d>W[2])return;if(a.w==="Mega Hammer"&&d<100){b.hp-=W[0];a.cool=W[1];return}if(a.w==="Pulse Laser"){b.hp-=W[0];a.cool=W[1];shots.push({x:a.x,y:a.y,tx:b.x,ty:b.y,t:5,beam:1});return}shots.push({x:a.x,y:a.y,vx:dx/d*9,vy:dy/d*9,dmg:W[0],own:a,t:90});a.cool=W[1]}
function update(){tick++;if(!p){draw();requestAnimationFrame(update);return}let sp=bodies[p.b][1]*legs[p.l][0];p.vx=(keys.d?sp:0)-(keys.a?sp:0);p.vy=(keys.s?sp:0)-(keys.w?sp:0);p.x=Math.max(35,Math.min(845,p.x+p.vx));p.y=Math.max(35,Math.min(585,p.y+p.vy));let dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;e.vx=dx/d*bodies[e.b][1]*legs[e.l][0]*.72;e.vy=dy/d*bodies[e.b][1]*legs[e.l][0]*.72;if(d>130){e.x+=e.vx;e.y+=e.vy}p.ang=Math.atan2(e.y-p.y,e.x-p.x);e.ang=Math.atan2(p.y-e.y,p.x-e.x);p.cool--;e.cool--;fire(p,e);if(tick%2===0)fire(e,p);shots.forEach(s=>{if(s.beam){s.t--;return}s.x+=s.vx;s.y+=s.vy;s.t--;let target=s.own===p?e:p;if(Math.hypot(target.x-s.x,target.y-s.y)<32){target.hp-=s.dmg;s.t=0}});shots=shots.filter(s=>s.t>0);if(p.hp<=0||e.hp<=0){msg=p.hp>0?"You won!":"The AI bot won.";p=null}draw();requestAnimationFrame(update)}
function bot(b,col){C.save();C.translate(b.x,b.y);C.rotate(b.ang);C.fillStyle=col;C.fillRect(-28,-22,56,44);C.fillStyle="#222";C.fillRect(-18,24,36,12);C.fillStyle="#9eeaff";C.fillRect(15,-8,35,16);C.restore();C.fillStyle="#222";C.fillRect(b.x-36,b.y-48,72,8);C.fillStyle=b.player?"#70ff9f":"#ff6b7c";C.fillRect(b.x-36,b.y-48,72*Math.max(0,b.hp/b.max),8)}
function draw(){C.clearRect(0,0,c.width,c.height);C.fillStyle="#111722";C.fillRect(0,0,c.width,c.height);for(let i=0;i<60;i++){C.fillStyle=i%2?"#182031":"#141b29";C.fillRect((i*97)%880,(i*53)%620,42,42)}C.strokeStyle="#52607e";C.lineWidth=8;C.strokeRect(12,12,856,596);if(p){bot(p,"#5ca8ff");bot(e,"#ffb04d")}shots.forEach(s=>{C.strokeStyle=s.beam?"#53f6ff":"#baff62";C.lineWidth=s.beam?4:0;if(s.beam){C.beginPath();C.moveTo(s.x,s.y);C.lineTo(s.tx,s.ty);C.stroke()}else{C.fillStyle="#baff62";C.beginPath();C.arc(s.x,s.y,7,0,7);C.fill()}});C.fillStyle="white";C.font="22px Arial";C.fillText(msg,22,34)}
start.onclick=()=>{p=makeBot(180,310,1);e=makeBot(700,310,0);shots=[];msg="Battle!";stats.textContent=`HP: ${p.max} | Weapon: ${p.w}`};update();
</script></body></html>
